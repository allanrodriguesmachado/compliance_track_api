security:
    # 1. Avisa que a entidade User tem senhas criptografadas
    password_hashers:
        App\Domain\User\Entity\User: 'auto'
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # 2. Ensina o Symfony a buscar o usuário no banco de dados (e não na memória!)
    providers:
        app_user_provider:
            entity:
                class: App\Domain\User\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        # 3. Firewall de Login (Gera o Token)
        login:
            pattern: ^/api/user/login
            stateless: true
            provider: app_user_provider # Diz para usar o banco de dados
            json_login:
                check_path: /api/user/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # 4. Firewall da API (Exige o Token nas outras rotas)
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

    # 5. Regras de Acesso
    access_control:
        - { path: ^/api/user/create, roles: PUBLIC_ACCESS }
        - { path: ^/api/user/login, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
